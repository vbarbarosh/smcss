name: ci

on:
  push:
    branches: [master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
      - run: npm ci
      - run: npm test
      - name: dist is in sync with src
        run: |
          npm run build
          git add -A dist demos/demo.css
          git diff --cached --exit-code -- dist demos/demo.css
